<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Hub — Вход</title>
    <style>
        :root { --bg-main:#0f0f13; --bg-card:#17171f; --border:#2a2a3a; --accent:#7c6fe0; --accent-hover:#6a5ecf; --text-primary:#e0e0e0; --text-muted:#666; --input-bg:#0f0f13; }
        [data-theme="light"] { --bg-main:#f0f2f5; --bg-card:#ffffff; --border:#d0d5e0; --text-primary:#1a1a2e; --text-muted:#777; --input-bg:#f8f9fc; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg-main); color:var(--text-primary); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .box { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:40px; width:min(400px,95vw); }
        h1 { font-size:22px; font-weight:700; color:var(--accent); margin-bottom:8px; }
        p.sub { font-size:13px; color:var(--text-muted); margin-bottom:28px; }
        label { font-size:12px; color:var(--text-muted); font-weight:500; display:block; margin-bottom:6px; }
        input { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text-primary); font-size:14px; outline:none; margin-bottom:16px; }
        input:focus { border-color:var(--accent); }
        .btn { width:100%; padding:11px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
        .btn:hover { background:var(--accent-hover); }
        .error { background:rgba(224,96,96,0.1); border:1px solid rgba(224,96,96,0.4); border-radius:8px; padding:10px 14px; font-size:13px; color:#e06060; margin-bottom:16px; }
        .links { text-align:center; margin-top:20px; font-size:13px; color:var(--text-muted); }
        .links a { color:var(--accent); text-decoration:none; }
    </style>
    <script>(function(){const t=localStorage.getItem('tghub_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>
<div class="box">
    <h1>TG Hub</h1>
    <p class="sub">Войдите в свой аккаунт</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <input type="hidden" name="next" value="{{ next }}">
        <label>Имя пользователя</label>
        <input type="text" name="username" autocomplete="username" autofocus required>
        <label>Пароль</label>
        <input type="password" name="password" autocomplete="current-password" required>
        <button type="submit" class="btn">Войти</button>
    </form>
    <div class="links">
        Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </div>
</div>
</body>
</html>
