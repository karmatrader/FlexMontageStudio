<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Hub — Двухфакторная аутентификация</title>
    <style>
        :root { --bg-main:#0f0f13; --bg-card:#17171f; --border:#2a2a3a; --accent:#7c6fe0; --accent-hover:#6a5ecf; --text-primary:#e0e0e0; --text-muted:#666; --input-bg:#0f0f13; }
        [data-theme="light"] { --bg-main:#f0f2f5; --bg-card:#ffffff; --border:#d0d5e0; --text-primary:#1a1a2e; --text-muted:#777; --input-bg:#f8f9fc; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg-main); color:var(--text-primary); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .box { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:40px; width:min(400px,95vw); text-align:center; }
        h1 { font-size:22px; font-weight:700; color:var(--accent); margin-bottom:8px; }
        p.sub { font-size:13px; color:var(--text-muted); margin-bottom:28px; }
        .icon { font-size:40px; margin-bottom:16px; }
        label { font-size:12px; color:var(--text-muted); font-weight:500; display:block; margin-bottom:6px; text-align:left; }
        input { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; color:var(--text-primary); font-size:20px; outline:none; text-align:center; letter-spacing:6px; margin-bottom:16px; }
        input:focus { border-color:var(--accent); }
        .btn { width:100%; padding:11px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
        .btn:hover { background:var(--accent-hover); }
        .error { background:rgba(224,96,96,0.1); border:1px solid rgba(224,96,96,0.4); border-radius:8px; padding:10px 14px; font-size:13px; color:#e06060; margin-bottom:16px; text-align:left; }
        .back { display:block; margin-top:16px; font-size:13px; color:var(--text-muted); }
        .back a { color:var(--accent); text-decoration:none; }
    </style>
    <script>(function(){const t=localStorage.getItem('tghub_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>
<div class="box">
    <div class="icon">🔐</div>
    <h1>Двухфакторная аутентификация</h1>
    <p class="sub">Введите 6-значный код из приложения-аутентификатора</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <label>Код подтверждения</label>
        <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autofocus required placeholder="000000">
        <button type="submit" class="btn">Подтвердить</button>
    </form>
    <span class="back"><a href="/login">← Назад к входу</a></span>
</div>
</body>
</html>
